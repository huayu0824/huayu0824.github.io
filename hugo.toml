baseURL = "https://huayu0824.github.io/"
languageCode = 'zh-cn'
title = '体育前瞻实验室'
theme = "PaperMod"

[params]
    env = "production"
    # 开启首页的“职业头像模式”
    [params.profileMode]
        enabled = true
        title = "2026 体育前瞻研究员"
        subtitle = "专注体育教育、AI动作分析及未来教学趋势"
        imageUrl = "https://github.com/github.png" # 暂时用个图标，以后换你的照片
        imageWidth = 120
        imageHeight = 120

    # 这里的链接你可以以后改
    [[params.socialIcons]]
        name = "github"
        url = "https://github.com/"
    [[params.socialIcons]]
        name = "email"
        url = "mailto:youremail@example.com"

    # 让文章首页显示摘要，而不是全文
    [params.homeInfoParams]
        Title = "欢迎来到我的知识库 👋"
        Content = "在这里，我记录对未来体育教学的深度思考。"

[menu]
    [[menu.main]]
        identifier = "posts"
        name = "文章"
        url = "/posts/"
        weight = 10
    [[menu.main]]
        identifier = "tags"
        name = "标签"
        url = "/tags/"
        weight = 20
