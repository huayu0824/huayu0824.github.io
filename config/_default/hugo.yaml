baseURL: https://huayu0824.github.io/
languageCode: zh-cn
title: 华羽的数据实验室
theme: hugo-theme-stack

# 这一段强制 Hugo 输出 HTML
outputs:
  home:
    - HTML
    - RSS

# 基础菜单
menu:
  main:
    - identifier: home
      name: 首页
      url: /
      weight: 1
      params:
        icon: home # 如果你配置了图标库，这里会显示图标

    - identifier: archives
      name: 归档
      url: /archives/
      weight: 2
      params:
        icon: archive

    - identifier: search
      name: 搜索
      url: /search/
      weight: 3
      params:
        icon: search

# 主题必要参数
params:
  sidebar:
    emoji: ⚽
    subtitle: 体育研究者 | 数据爱好者
    avatar:
      enabled: true
      local: true
      src: https://pic1.imgdb.cn/item/69e484c2124e4e0aada14f2c.jpg # 将你的头像放在 static/img/avatar.jpg
#添加分类，标签小部件
params:
  widgets:
    homepage:
      - type: search
      - type: archives
      - type: categories
        params:
          limit: 10
      - type: tag-cloud
        params:
          limit: 10
