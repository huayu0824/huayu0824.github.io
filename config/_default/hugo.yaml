baseURL: https://huayu0824.github.io/
languageCode: zh-cn
title: 花羽的数据实验室
theme: hugo-theme-stack

# --- 菜单配置 ---
menu:
  main:
    - identifier: home
      name: 首页
      url: /
      weight: 1
      params:
        icon: home
    - identifier: archives
      name: 归档
      url: /archives/
      weight: 2
      params:
        icon: archive
    - identifier: search
      name: 搜索
      url: /search/
      weight: 3
      params:
        icon: search

# --- 全局参数配置（关键：params 只能出现一次！） ---
params:
  main:
    description: 专注于体育研究与数据分享
  
  sidebar:
    emoji: ⚽
    subtitle: 体育研究者
    avatar:
      enabled: true
      local: false # 因为你用的是 URL 链接，这里必须选 false
      src: "https://pic1.imgdb.cn/item/69e484c2124e4e0aada14f2c.jpg"

  # 侧边栏/首页的小部件配置
  widgets:
    homepage:
      - type: search
      - type: archives
      - type: categories
        params:
          limit: 10
      - type: tag-cloud
        params:
          limit: 10
