baseURL: https://huayu0824.github.io/
# ... 其他配置 ...
# 添加下面这段，防止 Hugo 抓取远程图片失败导致打包中断
imaging:
  resampleFilter: Lanczos
  quality: 75

title: 花羽的数据实验室
theme: hugo-theme-stack
languageCode: zh-cn
defaultContentLanguage: zh-cn

# --- 菜单配置 ---
menu:
  main:
    - identifier: home
      name: 首页
      url: /
      weight: 1
      # 先不写 params.icon，确保能跑通
    - identifier: archives
      name: 归档
      url: /archives/
      weight: 2
    - identifier: search
      name: 搜索
      url: /search/
      weight: 3


# --- 全局参数配置（关键：params 只能出现一次！） ---
params:
  main:
    description: 专注于体育研究与数据分享
  
  sidebar:
    emoji: 🥋
    subtitle: 体育，照进生命的一束光
    # 直接写链接，不要套任何 src 或 enabled
    avatar: "https://pic1.imgdb.cn/item/69e484c2124e4e0aada14f2c.jpg"


  # 侧边栏/首页的小部件配置
  widgets:
    homepage:
      - type: search
      - type: archives
      - type: categories
        params:
          limit: 10
      - type: tag-cloud
        params:
          limit: 10
