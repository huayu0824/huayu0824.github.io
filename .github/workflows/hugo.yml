name: Deploy Hugo site to Pages

on:
  push:
    branches:
      - main  # 确保这里对应你的分支名

permissions:
  contents: read
  pages: write      # 必须有这一行，否则它没权发布
  id-token: write   # 必须有这一行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive  # <--- 关键：必须加这一行，让它下载主题代码
          fetch-depth: 0


      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build with Hugo
        run: hugo --minify

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
